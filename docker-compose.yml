version: "3.9"

services:
  metastore-db:
    image: postgres:15
    container_name: metastore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - metastore_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hive -d metastore_db" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 5s
      retries: 10

  bucket-init:
    image: minio/mc:latest
    container_name: bucket-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 minio minio12345 && mc mb -p local/lakehouse/raw || true && mc mb -p local/lakehouse/bronze || true && mc mb -p local/lakehouse/silver || true && mc mb -p local/lakehouse/gold || true && exit 0 "
    restart: "no"

  hive-metastore:
    image: apache/hive:standalone-metastore-4.1.0
    container_name: hive-metastore
    restart: unless-stopped
    depends_on:
      metastore-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      bucket-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Xmx1G -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore_db -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=password
      HADOOP_CLASSPATH: /opt/hadoop/share/hadoop/tools/lib/*
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio12345
      IS_RESUME: "false"
    ports:
      - "9083:9083"
    volumes:
      - ./jars/postgresql-42.7.3.jar:/opt/hive/lib/postgres.jar:ro
      - ./hive/conf/core-site.xml:/opt/hive/conf/core-site.xml:ro
      - ./hive/conf/metastore-site.xml:/opt/hive/conf/metastore-site.xml:ro

  spark:
    image: bitnamilegacy/spark:3.5
    container_name: spark
    restart: unless-stopped
    environment:
      SPARK_MODE: master
    depends_on:
      - minio
    volumes:
      - ./spark/apps:/opt/bitnami/spark/apps
    ports:
      - "4040:4040"
  trino:
    image: trinodb/trino:480
    container_name: trino
    restart: unless-stopped
    depends_on:
      hive-metastore:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  postgres:
    image: postgres:15
    container_name: de_postgres
    restart: unless-stopped
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
      POSTGRES_DB: de_db
    ports:
      - "5432:5432"
    volumes:
      - app_pg_data:/var/lib/postgresql/data

  connect:
    image: debezium/connect:2.4
    container_name: de_connect
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONFIG_STORAGE_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      OFFSET_STORAGE_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      OFFSET_STORAGE_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

volumes:
  metastore_db_data:
  minio_data:
  kafka_data:
  app_pg_data:
